name: Keep Render Backend Awake

on:
  schedule:
    # Runs every 10 minutes to prevent the Render Free Tier from sleeping
    - cron: '*/10 * * * *'
  workflow_dispatch: # Allows you to run it manually from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Backend
        run: curl -s https://energylens-backend-i8xp.onrender.com/health/db > /dev/null
